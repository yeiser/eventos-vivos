<div class="ev-auth d-flex flex-column flex-center min-vh-100 p-5">
  <div class="card shadow-sm w-100" style="max-width: 440px;">
    <div class="card-body p-10">
      <div class="text-center mb-8">
        <div class="ev-auth__logo mx-auto mb-4">EV</div>
        <h1 class="fs-2 fw-bold text-gray-900">EventosVivos</h1>
        <span class="text-gray-500 fw-semibold">Inicia sesión para continuar</span>
      </div>

      <form [formGroup]="form" (ngSubmit)="enviar()" novalidate>
        <div class="mb-5">
          <label class="form-label fw-semibold">Usuario</label>
          <input type="text" class="form-control form-control-solid" formControlName="nombreUsuario"
                 autocomplete="username" placeholder="admin" />
          @if (invalido('nombreUsuario')) {
            <div class="text-danger fs-7 mt-1">El usuario es obligatorio.</div>
          }
        </div>

        <div class="mb-8">
          <label class="form-label fw-semibold">Contraseña</label>
          <input type="password" class="form-control form-control-solid" formControlName="password"
                 autocomplete="current-password" placeholder="••••••••" />
          @if (invalido('password')) {
            <div class="text-danger fs-7 mt-1">La contraseña es obligatoria.</div>
          }
        </div>

        <button type="submit" class="btn btn-primary w-100" [disabled]="cargando()">
          @if (cargando()) {
            <span class="spinner-border spinner-border-sm align-middle me-2"></span> Ingresando…
          } @else {
            Ingresar
          }
        </button>
      </form>

      <div class="text-center text-gray-500 fs-8 mt-6">
        Demo: <code>admin / Admin123!</code> · <code>usuario / Usuario123!</code>
      </div>
    </div>
  </div>
</div>
