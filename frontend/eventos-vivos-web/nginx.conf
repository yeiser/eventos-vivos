# Nginx para la SPA de EventosVivos: sirve los estáticos y hace de reverse-proxy
# de la API (mismo origen → sin CORS).
#
# Es una PLANTILLA: la imagen oficial de Nginx ejecuta envsubst sobre los ficheros de
# /etc/nginx/templates/*.template al arrancar. Solo se sustituye ${API_UPSTREAM}
# (las variables propias de Nginx como $host o $uri se preservan).
#   - Docker Compose:  API_UPSTREAM=api:8080        (nombre de servicio)
#   - Azure ACI:       API_UPSTREAM=localhost:8080  (contenedores comparten red)
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compresión de estáticos.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # API → contenedor del backend (preserva el prefijo /api/v1).
    location /api/ {
        proxy_pass         http://${API_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Assets con hash → caché agresiva.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Fallback de la SPA (Angular router).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
