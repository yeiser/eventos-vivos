# Nginx para la SPA de EventosVivos: sirve los estáticos y hace de reverse-proxy
# de la API (mismo origen → sin CORS). El nombre del upstream se puede sobreescribir
# con la variable de entorno API_UPSTREAM (por defecto, el servicio "api" del compose).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compresión de estáticos.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # API → contenedor del backend (preserva el prefijo /api/v1).
    location /api/ {
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Assets con hash → caché agresiva.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Fallback de la SPA (Angular router).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
