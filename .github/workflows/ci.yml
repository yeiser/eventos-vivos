name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela ejecuciones previas de la misma rama/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (.NET 10)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        working-directory: backend
        run: dotnet restore EventosVivos.slnx

      - name: Build
        working-directory: backend
        run: dotnet build EventosVivos.slnx -c Release --no-restore

      # Las pruebas de integración usan Testcontainers; el runner de GitHub trae Docker.
      - name: Test
        working-directory: backend
        run: dotnet test EventosVivos.slnx -c Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Publicar resultados de prueba
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/**/TestResults/*.trx
          if-no-files-found: ignore

  frontend:
    name: Frontend (Angular 22)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/eventos-vivos-web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/eventos-vivos-web/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npx ng test --watch=false

  # Verifica que las imágenes Docker construyen (sin assets de Metronic en CI; el build avisa
  # pero no falla). No publica: solo valida los Dockerfile.
  docker-build:
    name: Docker build (smoke)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build imagen API
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: eventosvivos-api:ci

      - name: Build imagen Web
        uses: docker/build-push-action@v6
        with:
          context: ./frontend/eventos-vivos-web
          push: false
          tags: eventosvivos-web:ci
