name: SonarCloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  analyze:
    name: Análisis SonarCloud
    runs-on: ubuntu-latest
    # El job se omite hasta que configures la organización (ver README → Calidad de código).
    if: ${{ vars.SONAR_ORGANIZATION != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # historial completo: análisis de "new code" y blame

      - name: Setup JDK 17 (requerido por el scanner de Sonar)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/eventos-vivos-web/package-lock.json

      - name: Cache del scanner
        uses: actions/cache@v4
        with:
          path: ~/.sonar/scanner
          key: ${{ runner.os }}-sonar-scanner

      - name: Instalar SonarScanner para .NET
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Begin (arranca el análisis)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          dotnet sonarscanner begin
          /k:"${{ vars.SONAR_PROJECT_KEY }}"
          /o:"${{ vars.SONAR_ORGANIZATION }}"
          /d:sonar.host.url="https://sonarcloud.io"
          /d:sonar.token="$SONAR_TOKEN"
          /d:sonar.scanner.scanAll=true
          /d:sonar.cs.opencover.reportsPaths="coverage-backend/**/coverage.opencover.xml"
          /d:sonar.javascript.lcov.reportPaths="frontend/eventos-vivos-web/coverage/eventos-vivos-web/lcov.info"
          /d:sonar.exclusions="**/bin/**,**/obj/**,**/Migrations/**,frontend/**/node_modules/**,frontend/**/dist/**,frontend/**/.angular/**,frontend/**/public/**,infra/**"
          /d:sonar.coverage.exclusions="**/Migrations/**,**/Program.cs,backend/tests/**,**/*.spec.ts,frontend/**/src/main.ts,frontend/**/src/environments/**,frontend/**/*.config.ts"

      - name: Build backend
        run: dotnet build backend/EventosVivos.slnx -c Release

      - name: Test backend (cobertura OpenCover) — incluye integración (Testcontainers)
        run: >
          dotnet test backend/EventosVivos.slnx -c Release --no-build
          --settings backend/coverlet.runsettings
          --collect:"XPlat Code Coverage"
          --results-directory coverage-backend

      - name: Frontend — instalar y test con cobertura (lcov)
        working-directory: frontend/eventos-vivos-web
        run: |
          npm ci --ignore-scripts
          npm test -- --watch=false --coverage --coverage-reporters=lcovonly

      - name: End (publica a SonarCloud + Quality Gate)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"
