# EventosVivos — despliegue de producción (p. ej. Azure Container Instances / VM con Docker).
#
# A diferencia del compose local, NO incluye PostgreSQL: la base de datos es un servicio
# gestionado (Azure Database for PostgreSQL). Las imágenes se obtienen de un registry (ACR)
# y TODO secreto se inyecta por variable de entorno (idealmente desde Azure Key Vault).
#
#   REGISTRY=miacr.azurecr.io TAG=1.0.0 \
#   ConnectionStrings__Postgres="Host=...;..." Jwt__SecretKey="..." \
#   docker compose -f docker-compose.prod.yml up -d
#
# Variables requeridas (sin valor por defecto): POSTGRES_CONN, JWT_SECRET, WEB_ORIGIN.

services:
  api:
    image: ${REGISTRY:?falta REGISTRY}/eventosvivos-api:${TAG:?falta TAG}
    restart: always
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: ${POSTGRES_CONN:?falta POSTGRES_CONN}
      # En producción las migraciones suelen correr como paso de pipeline; déjalo en false
      # si prefieres aplicarlas aparte. true = autoaplicar al arrancar.
      Database__AutoMigrate: ${AUTO_MIGRATE:-true}
      Cors__Origins__0: ${WEB_ORIGIN:?falta WEB_ORIGIN}
      Jwt__SecretKey: ${JWT_SECRET:?falta JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER:-EventosVivos}
      Jwt__Audience: ${JWT_AUDIENCE:-EventosVivosClients}
    expose:
      - "8080"

  frontend:
    image: ${REGISTRY:?falta REGISTRY}/eventosvivos-web:${TAG:?falta TAG}
    restart: always
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-80}:80"
