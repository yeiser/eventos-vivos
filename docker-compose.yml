# EventosVivos — orquestación local (Fase 0: solo base de datos).
# En la Fase 10 se añadirán los servicios `api` y `frontend`.
# Ver DISEÑO-ARQUITECTURA.md §20.3.

services:
  db:
    image: postgres:16-alpine
    container_name: eventosvivos-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eventosvivos}
      POSTGRES_USER: ${POSTGRES_USER:-eventosvivos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eventosvivos_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - eventosvivos_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eventosvivos} -d ${POSTGRES_DB:-eventosvivos}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  eventosvivos_pgdata:
    name: eventosvivos_pgdata
