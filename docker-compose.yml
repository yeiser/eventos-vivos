# EventosVivos — orquestación local completa: PostgreSQL + API (.NET 10) + Web (Angular/Nginx).
#
#   docker compose up --build         → levanta db + api + frontend
#   Web:     http://localhost:${WEB_PORT:-8080}
#   API:     http://localhost:${API_PORT:-5080}  (Swagger en /swagger)
#   Login:   admin / Admin123!   ·   usuario / Usuario123!
#
# El frontend (Nginx) hace de proxy de /api/ hacia el contenedor `api` (mismo origen → sin CORS).

services:
  db:
    image: postgres:16-alpine
    container_name: eventosvivos-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eventosvivos}
      POSTGRES_USER: ${POSTGRES_USER:-eventosvivos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eventosvivos_dev}
    ports:
      # Puerto por defecto 5440 para no chocar con un PostgreSQL local en el 5432.
      - "${POSTGRES_PORT:-5440}:5432"
    volumes:
      - eventosvivos_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eventosvivos} -d ${POSTGRES_DB:-eventosvivos}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: eventosvivos-api:local
    container_name: eventosvivos-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: "Host=db;Port=5432;Database=${POSTGRES_DB:-eventosvivos};Username=${POSTGRES_USER:-eventosvivos};Password=${POSTGRES_PASSWORD:-eventosvivos_dev}"
      # Aplica migraciones + seed al arrancar dentro del contenedor.
      Database__AutoMigrate: "true"
      # Orígenes permitidos (el frontend va por el mismo origen vía Nginx; esto es para acceso directo).
      Cors__Origins__0: "http://localhost:${WEB_PORT:-8080}"
      Cors__Origins__1: "http://localhost:${API_PORT:-5080}"
      # Secreto JWT (placeholder de desarrollo; en prod se inyecta por variable/Key Vault).
      Jwt__SecretKey: ${JWT_SECRET:-dev-only-secret-please-override-in-prod-0123456789ABCDEF}
    ports:
      - "${API_PORT:-5080}:8080"

  frontend:
    build:
      context: ./frontend/eventos-vivos-web
      dockerfile: Dockerfile
    image: eventosvivos-web:local
    container_name: eventosvivos-web
    restart: unless-stopped
    environment:
      API_UPSTREAM: api:8080
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-8080}:8080"

volumes:
  eventosvivos_pgdata:
    name: eventosvivos_pgdata
